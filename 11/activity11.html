<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Activity 11 - Loops</title>
  <link rel="stylesheet" href="style 11.css">
</head>
<body>
  
 

  <section>
    <h2>For Loop</h2>
    <label>Enter number: <input type="number" id="forNum"></label>
    <label>Enter text: <input type="text" id="forText"></label>
    <button onclick="showForLoop()">Show</button>
    <button onclick="clearOutput('forOutput')">Clear</button>
    <div id="forOutput"></div>
  </section>
 

  <section>
    <h2>While Loop</h2>
    <label>Enter number: <input type="number" id="whileNum"></label>
    <label>Enter text: <input type="text" id="whileText"></label>
    <button onclick="showWhileLoop()">Show</button>
    <button onclick="clearOutput('whileOutput')">Clear</button>
    <div id="whileOutput"></div>
  </section>
 

  <section>
    <h2>Do-While Loop</h2>
    <label>Enter number: <input type="number" id="doNum"></label>
    <label>Enter text: <input type="text" id="doText"></label>
    <button onclick="showDoWhileLoop()">Show</button>
    <button onclick="clearOutput('doOutput')">Clear</button>
    <div id="doOutput"></div>
  </section>
 
  <script src="script 11.js"></script>
</body>
</html>
