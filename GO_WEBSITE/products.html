<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="stylehome.css">
  <style>
    body { padding: 40px 50px; }
    h1 { margin-bottom: 32px; }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 16px;
      margin-top: 36px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 16px;
    }

    .menu-card {
      background: #fff;
      border: 1px solid #e0d0b8;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(60,30,10,0.15);
    }

    .menu-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 16px;
    }

    .card-body .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--brown);
      margin-bottom: 4px;
    }

    .card-body .item-price {
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .btn-buy {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--brown);
      color: var(--gold-light);
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .btn-buy:hover {
      background: var(--gold);
      color: var(--dark);
    }

    /* Cart notification */
    .cart-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--brown);
      color: var(--gold-light);
      padding: 12px 24px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      border-left: 4px solid var(--gold);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .cart-toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Our Menu</h1>

  <div class="section-label">— Food</div>
  <div class="menu-grid">
    <div class="menu-card">
      <img src="images/fried chicken.jpg" alt="Fried Chicken">
      <div class="card-body">
        <div class="item-name">Fried Chicken</div>
        <div class="item-price">₱199</div>
        <button class="btn-buy" onclick="addToCart('Fried Chicken')">Add to Order</button>
      </div>
    </div>
    <div class="menu-card">
      <img src="images/Kebab.jpg" alt="Kebab">
      <div class="card-body">
        <div class="item-name">Kebab</div>
        <div class="item-price">₱179</div>
        <button class="btn-buy" onclick="addToCart('Kebab')">Add to Order</button>
      </div>
    </div>
    <div class="menu-card">
      <img src="images/pork.jpg" alt="Pork">
      <div class="card-body">
        <div class="item-name">Pork</div>
        <div class="item-price">₱219</div>
        <button class="btn-buy" onclick="addToCart('Pork')">Add to Order</button>
      </div>
    </div>
  </div>

  <div class="section-label">— Drinks</div>
  <div class="menu-grid">
    <div class="menu-card">
      <img src="images/pina.jpg" alt="Pina Colada">
      <div class="card-body">
        <div class="item-name">Pina Colada</div>
        <div class="item-price">₱149</div>
        <button class="btn-buy" onclick="addToCart('Pina Colada')">Add to Order</button>
      </div>
    </div>
    <div class="menu-card">
      <img src="images/marga.jpeg" alt="Margarita">
      <div class="card-body">
        <div class="item-name">Margarita</div>
        <div class="item-price">₱149</div>
        <button class="btn-buy" onclick="addToCart('Margarita')">Add to Order</button>
      </div>
    </div>
    <div class="menu-card">
      <img src="images/mojito.jpeg" alt="Mojito">
      <div class="card-body">
        <div class="item-name">Mojito</div>
        <div class="item-price">₱139</div>
        <button class="btn-buy" onclick="addToCart('Mojito')">Add to Order</button>
      </div>
    </div>
  </div>

  <div class="cart-toast" id="toast"></div>

  <script>
    function addToCart(item) {
      const toast = document.getElementById('toast');
      toast.textContent = `✓ ${item} added to your order!`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
