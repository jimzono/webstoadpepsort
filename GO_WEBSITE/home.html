<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="stylehome.css">
  <style>
    body { padding: 50px 60px; }
    .welcome-badge {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 6px 16px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    h1 { font-size: 2.8rem; margin-bottom: 20px; border-bottom: none; padding: 0; }
    .tagline {
      font-size: 1.15rem;
      color: #5a4030;
      line-height: 1.9;
      max-width: 560px;
      margin-bottom: 32px;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: var(--gold);
      margin-bottom: 28px;
    }
    .highlights {
      display: flex;
      gap: 40px;
      margin-top: 8px;
    }
    .highlight-item {
      text-align: center;
    }
    .highlight-item .number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      font-weight: 700;
    }
    .highlight-item .label {
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7a6040;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="welcome-badge">Welcome</div>
  <h1>The Good Time Bar</h1>
  <div class="divider"></div>
  <p class="tagline">
    Craving great drinks and satisfying food? You've come to the right place.
    We serve handcrafted cocktails and bold comfort food in a warm, welcoming atmosphere.
  </p>
  <div class="highlights">
    <div class="highlight-item">
      <div class="number">6</div>
      <div class="label">Menu Items</div>
    </div>
    <div class="highlight-item">
      <div class="number">3</div>
      <div class="label">Signature Drinks</div>
    </div>
    <div class="highlight-item">
      <div class="number">∞</div>
      <div class="label">Good Times</div>
    </div>
  </div>
</body>
</html>
